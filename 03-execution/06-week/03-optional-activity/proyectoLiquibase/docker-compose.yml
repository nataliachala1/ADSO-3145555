version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres_pedidos
    environment:
      POSTGRES_DB: pedidos
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d pedidos"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pedidos-network

volumes:
  postgres_data:

networks:
  pedidos-network:
    name: pedidos-network